<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0c1110" />
<meta name="description" content="Calculadoras para laboratório e registros de aplicações experimentais de campo." />
<link rel="manifest" href="manifest.webmanifest" />
<title>BioCalculo</title>
<style>
@font-face{font-family:'Inter var';src:url('fonts/inter.woff2') format('woff2');font-weight:100 900;font-display:swap;font-style:normal}
@font-face{font-family:'Sora var';src:url('fonts/sora.woff2') format('woff2');font-weight:400 800;font-display:swap;font-style:normal}
:root{
  --bg:#0c1110;
  --card:#fff;
  --line:#d8ded8;
  --text:#18211d;
  --muted:#627069;
  --accent:#21a86b;
  --accent-d:#1c7f51;
  --accent-soft:#e4f3ea;
  --info:#2f85c9;
  --shadow:0 8px 20px rgba(19,31,25,.16);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;
  --font-title:var(--font);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font)}
body{min-height:100vh;padding-bottom:16px}
.appnav{
  display:flex;
  gap:8px;
  max-width:860px;
  width:calc(100% - 24px);
  margin:8px auto 0;
  padding:7px;
  border:1px solid rgba(255,255,255,.14);
  border-radius:14px;
  background:rgba(13,18,16,.78);
  box-shadow:0 12px 34px rgba(0,0,0,.28);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}
.appnav a{
  flex:1 1 0;
  min-height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,.14);
  border-radius:8px;
  background:rgba(255,255,255,.07);
  color:#d8e0db;
  text-decoration:none;
  font-size:11px;
  font-weight:760;
  text-transform:uppercase;
}
.appnav a:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.22);color:#fff}
.appnav a.active{background:rgba(33,168,107,.18);border-color:rgba(33,168,107,.45);color:#dff8eb}
main{max-width:860px;margin:0 auto;padding:10px 12px}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  box-shadow:var(--shadow);
  padding:16px;
  margin-bottom:10px;
}
h1,h2{font-family:var(--font-title);letter-spacing:0}
h1{font-size:19px;margin:2px 0 10px}
h2{font-size:16px;margin:0 0 6px}
p{margin:0 0 12px;color:var(--muted);font-size:13px;line-height:1.4}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{
  display:flex;
  flex-direction:column;
  gap:8px;
  min-height:158px;
  padding:14px;
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  color:inherit;
  text-decoration:none;
}
.tile:hover{border-color:#b9c8bf}
.tile strong{font:820 16px var(--font-title)}
.tile span{color:var(--muted);font-size:13px;line-height:1.35}
.tile b{margin-top:auto;color:var(--accent-d);font-size:13px}
.brand{margin:6px 0 0;text-align:center;color:#8c9891;font-size:11px;font-weight:760}
@media(max-width:640px){
  .appnav{width:calc(100% - 16px);gap:6px;margin-top:7px;padding:6px}
  main{padding:8px}
  .grid{grid-template-columns:1fr}
  .card{padding:14px}
}
</style>
</head>
<body>
<nav class="appnav" aria-label="Navegação principal">
  <a class="active" href="index.html" aria-current="page">Início</a>
  <a href="calda.html">Laboratório</a>
  <a href="campo.html">Campo</a>
</nav>
<main>
  <section class="card">
    <div class="grid">
      <a class="tile" href="calda.html">
        <strong>Laboratório</strong>
        <span>PPM, preparo de soluções, campo para bancada, ajuste de ingrediente ativo e séries de concentração.</span>
        <b>Abrir</b>
      </a>
      <a class="tile" href="campo.html">
        <strong>Campo — registro BPL</strong>
        <span>Aplicações, tratamentos, lotes, condições, calibração, cálculos, evidências e revisões rastreadas.</span>
        <b>Abrir</b>
      </a>
    </div>
  </section>
  <div class="brand">BioCalculo</div>
</main>
<script>
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(function(){});
</script>
</body>
</html>
